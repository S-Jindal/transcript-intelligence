<head><meta charset="utf-8" />
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    min-height: 100%;
    background: #ffffff;
    font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
  }
  .plotly-graph-div, .js-plotly-plot {
    width: 100vw !important;
    min-height: calc(100vh - 72px) !important;
  }
  #chart-point-panel {
    position: sticky;
    top: 0;
    z-index: 20;
    display: flex;
    gap: 8px;
    align-items: center;
    padding: 10px 14px;
    background: #0f172a;
    color: #e2e8f0;
    border-bottom: 1px solid #334155;
  }
  #chart-point-panel label {
    font-size: 12px;
    white-space: nowrap;
    color: #94a3b8;
  }
  #chart-point-id {
    flex: 1;
    min-width: 0;
    font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
    padding: 8px 10px;
    border: 1px solid #334155;
    border-radius: 6px;
    background: #1e293b;
    color: #f8fafc;
  }
  #chart-point-copy {
    border: 0;
    border-radius: 6px;
    padding: 8px 12px;
    background: #38bdf8;
    color: #0f172a;
    font-weight: 600;
    cursor: pointer;
  }
  #chart-point-status {
    font-size: 12px;
    color: #86efac;
    min-width: 140px;
  }
</style>

<body>
<div id="chart-point-panel">
  <label for="chart-point-id">chart_point_id</label>
  <input id="chart-point-id" readonly placeholder="Hover a bar, then copy" />
  <button id="chart-point-copy" type="button">Copy</button>
  <span id="chart-point-status"></span>
</div>
<script>
(function () {
  function bind(plot) {
    var input = document.getElementById("chart-point-id");
    var status = document.getElementById("chart-point-status");
    var button = document.getElementById("chart-point-copy");

    function chartPointId(point) {
      var data = point && point.customdata;
      if (Array.isArray(data)) return data[3];
      return null;
    }

    function setId(value) {
      if (!value) return;
      input.value = value;
      status.textContent = "Ready to copy";
    }

    function copyId() {
      if (!input.value) return;
      input.select();
      navigator.clipboard.writeText(input.value).then(function () {
        status.textContent = "Copied";
      }).catch(function () {
        document.execCommand("copy");
        status.textContent = "Copied";
      });
    }

    button.addEventListener("click", copyId);
    input.addEventListener("focus", function () { input.select(); });
    plot.on("plotly_hover", function (event) {
      if (!event || !event.points || !event.points.length) return;
      setId(chartPointId(event.points[0]));
    });
    plot.on("plotly_click", function (event) {
      if (!event || !event.points || !event.points.length) return;
      setId(chartPointId(event.points[0]));
      copyId();
    });
  }

  function start() {
    var plot = document.querySelector(".js-plotly-plot");
    if (plot) {
      bind(plot);
      return;
    }
    var observer = new MutationObserver(function () {
      var found = document.querySelector(".js-plotly-plot");
      if (found) {
        observer.disconnect();
        bind(found);
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", start);
  } else {
    start();
  }
})();
</script>
