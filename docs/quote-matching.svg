<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Quote matching for findings evidence</title>
  <desc id="desc">Exact substring match first, then sliding-window Levenshtein up to k edits; store the matched segment span.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; }
      .ok { fill: #ecfdf5; stroke: #047857; stroke-width: 1.5; }
      .bad { fill: #fef2f2; stroke: #b91c1c; stroke-width: 1.5; }
      .title { font: 700 18px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #0f172a; }
      .label { font: 600 14px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #0f172a; }
      .sub { font: 12px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #475569; }
      .edge { stroke: #334155; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .edge-label { font: 11px "IBM Plex Sans", "Segoe UI", sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect width="720" height="420" fill="#ffffff"/>
  <text x="36" y="36" class="title">Finding quote alignment</text>
  <text x="36" y="56" class="sub">Keep the finding when the LLM quote is close enough; evidence always uses text from the segment.</text>

  <rect class="box" x="260" y="80" width="200" height="48" rx="6"/>
  <text x="360" y="102" text-anchor="middle" class="label">LLM quote</text>
  <text x="360" y="118" text-anchor="middle" class="sub">from structured findings</text>

  <path class="edge" d="M360 128 V156"/>

  <rect class="box" x="260" y="156" width="200" height="48" rx="6"/>
  <text x="360" y="178" text-anchor="middle" class="label">Exact find</text>
  <text x="360" y="194" text-anchor="middle" class="sub">segment.find(quote)</text>

  <path class="edge" d="M260 180 H140 V230"/>
  <text x="170" y="172" class="edge-label">hit</text>
  <path class="edge" d="M360 204 V232"/>
  <text x="368" y="224" class="edge-label">miss</text>

  <rect class="box" x="220" y="232" width="280" height="64" rx="6"/>
  <text x="360" y="256" text-anchor="middle" class="label">Fuzzy window search</text>
  <text x="360" y="274" text-anchor="middle" class="sub">windows of length |quote| ± k</text>
  <text x="360" y="288" text-anchor="middle" class="sub">Levenshtein DP distance d k</text>

  <path class="edge" d="M220 264 H140 V230"/>
  <text x="150" y="250" class="edge-label">dist d k</text>
  <path class="edge" d="M500 264 H580 V310"/>
  <text x="520" y="250" class="edge-label">no window</text>

  <rect class="ok" x="40" y="230" width="200" height="64" rx="6"/>
  <text x="140" y="256" text-anchor="middle" class="label">Keep finding</text>
  <text x="140" y="274" text-anchor="middle" class="sub">evidence quote =</text>
  <text x="140" y="288" text-anchor="middle" class="sub">segment[start:end]</text>

  <rect class="bad" x="480" y="310" width="200" height="56" rx="6"/>
  <text x="580" y="334" text-anchor="middle" class="label">Skip finding</text>
  <text x="580" y="352" text-anchor="middle" class="sub">invented / too divergent</text>

  <text x="36" y="390" class="sub">k = QUOTE_MAX_EDIT_DISTANCE (default 15). Best match: lowest distance, then earliest start.</text>
</svg>
